; DiffusionGemma — block-diffusion model; needs llama-diffusion-cli (PR #24423), not llama-server.
; Run: python3 ~/llama.cpp/scripts/start-llama-diffusion.py diffusiongemma-26b-q4_k_m
; Smoke test: cd ~/lukes-dev-lab/tests/diffusion && python src/run.py --profile diffusiongemma-26b-q4_k_m
[diffusiongemma-26b-q4_k_m]
runner = diffusion
model = /home/user/llama.cpp/models/diffusiongemma-26B-A4B-it-Q4_K_M.gguf
; Q4_K_M ~16GB — stop llama-server first. ngl=25 fits 16GB VRAM (99 OOMs).
ngl = 25
n = 2048
cnv = on
mlock = false

; CPU/RAM-only — no GPU offload at all (--device none). For benchmarking pure CPU
; throughput. ngl default is auto (-1), so GPU layers must be disabled explicitly;
; --device none does that (note: ngl=0 alone is dropped by the launcher's 0-skip).
; Q4_K_M ~16.8GB lives entirely in system RAM - needs ~18GB+ free. Flip mlock=true
; to pin weights in RAM (no swap) once you confirm the RAM headroom. Expect slow tok/s.
[diffusiongemma-26b-q4_k_m-cpu]
runner = diffusion
model = /home/user/llama.cpp/models/diffusiongemma-26B-A4B-it-Q4_K_M.gguf
dev = none
n = 2048
cnv = on
mlock = false

